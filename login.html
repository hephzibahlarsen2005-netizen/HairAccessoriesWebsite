<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hair Accessories</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div style="width:350px; margin:100px auto; background:white; padding:30px; border-radius:10px; text-align:center; box-shadow:0 0 10px gray;">

<h2>Login</h2>

<input type="text" id="username" placeholder="Username" style="width:90%; padding:10px;"><br><br>

<input type="password" id="password" placeholder="Password" style="width:90%; padding:10px;"><br><br>

<button onclick="login()">Login</button>

<p id="msg" style="color:red;"></p>

</div>

<script>
function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user=="admin" && pass=="1234"){

localStorage.setItem("loggedIn","true");

window.location.href="index.html";

}
else{

document.getElementById("msg").innerHTML="Invalid Username or Password";

}

}
</script>

</body>
</html>
