<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1 align="center">Checkout</h1>

<form align="center" onsubmit="placeOrder(event)">
    <input type="text" placeholder="Full Name" required><br><br>

    <input type="text" placeholder="Phone Number" required><br><br>

    <textarea placeholder="Delivery Address" required></textarea><br><br>

    <button type="submit">Place Order</button>
</form>

<script>
function placeOrder(event){
    event.preventDefault();
    localStorage.removeItem("cart");
    alert("🎉 Order Placed Successfully!");
    window.location.href="index.html";
}
</script>

</body>
</html>
