<!DOCTYPE html>
<html>
<head>
    <title>Products - Hair Accessories</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <a href="cart.html">
    <button>🛒 View Cart</button>
</a>

    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>

    <h1>Our Hair Accessories</h1>

    <div class="products">

        <div class="product">
            <img src="images/clip.jpg" alt="Hair Clip">
            <h3>Hair Clip</h3>
            <p>₹199</p>
            <button onclick="addToCart('Hair Clip',199)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="images/band.jpg" alt="Hair Band">
            <h3>Hair Band</h3>
            <p>₹299</p>
            <button onclick="addToCart('Hair Band',299)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="images/bow.jpg" alt="Hair Bow">
            <h3>Hair Bow</h3>
            <p>₹149</p>
            <button onclick="addToCart('Hair Bow',149)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="images/pearl.jpg" alt="Pearl Clip">
            <h3>Pearl Clip</h3>
            <p>₹249</p>
            <button onclick="addToCart('Pearl Clip',249)">Add to Cart</button>
        </div>

    </div>
    <footer>
    <p>&copy; 2026 Hair Accessories Website</p>
    <p>Email: info@hairaccessories.com</p>
    <p>Phone: +91 98765 43210</p>
    <p>Location: Gandhipuram, Coimbatore, Tamil Nadu</p>
</footer>
<script>
function addToCart(name, price) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart.push({name: name, price: price});
    localStorage.setItem("cart", JSON.stringify(cart));
    alert(name + " added to cart!");
}
</script>

</body>
</html>
